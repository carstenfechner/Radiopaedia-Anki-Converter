<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiopaedia → Anki</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --surface2:  #1c1c26;
      --border:    #2a2a3a;
      --accent:    #ff9800;
      --accent-dim:rgba(255,152,0,0.12);
      --text:      #e0e0e0;
      --text-dim:  #888;
      --success:   #4caf50;
      --error:     #f44336;
      --radius:    10px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ---- Header ---- */
    header { text-align: center; margin-bottom: 36px; }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-dim); margin-top: 6px; font-size: 0.92rem; }

    /* ---- Card ---- */
    .card {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
    }

    /* ---- Form elements ---- */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 7px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.93rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }
    input[type="text"]   { height: 42px; resize: none; }
    textarea             { height: 150px; }
    ::placeholder        { color: #444; }

    /* ---- Max cases row ---- */
    .max-cases-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .max-cases-row label { margin: 0; white-space: nowrap; }
    .max-cases-row input[type="number"] {
      width: 68px;
      height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.93rem;
      padding: 0 10px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .max-cases-row input[type="number"]:focus {
      border-color: var(--accent);
    }
    .max-cases-row input[type="number"]::-webkit-inner-spin-button,
    .max-cases-row input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }
    .max-cases-row .hint {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    /* ---- Two-column URL panel ---- */
    .url-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 22px;
    }
    @media (max-width: 600px) { .url-panels { grid-template-columns: 1fr; } }

    .url-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .url-panel-header .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-article { background: rgba(100,181,246,0.15); color: #64b5f6; }
    .badge-case    { background: rgba(255,152,0,0.15);   color: #ff9800; }

    /* ---- Submit button ---- */
    .btn-submit {
      margin-top: 26px;
      width: 100%;
      height: 48px;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover   { background: #ffb030; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Progress section ---- */
    #progress-section { display: none; margin-top: 28px; }

    .progress-bar-wrap {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }

    #progress-log {
      max-height: 260px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-line {
      font-size: 0.85rem;
      padding: 7px 12px;
      border-radius: 6px;
      background: var(--surface2);
      border-left: 3px solid var(--border);
      color: var(--text-dim);
      word-break: break-all;
    }
    .log-line.done    { border-left-color: var(--success); color: #a5d6a7; }
    .log-line.error   { border-left-color: var(--error);   color: #ef9a9a; background: rgba(244,67,54,0.08); }
    .log-line.active  { border-left-color: var(--accent);  color: var(--text); }

    /* ---- Download section ---- */
    #download-section { display: none; margin-top: 22px; }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 52px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      border: 1px solid var(--accent);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-download:hover { background: rgba(255,152,0,0.22); }

    /* ---- Separator ---- */
    .sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0 0;
    }

    /* ---- Footer ---- */
    footer {
      margin-top: 40px;
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
    }
    footer a { color: var(--text-dim); }
  </style>
</head>
<body>

  <header>
    <h1>Radiopaedia <span>→</span> Anki</h1>
    <p>Scrape articles &amp; cases and export a ready-to-import <code>.apkg</code> deck.</p>
  </header>

  <div class="card">
    <form id="job-form" autocomplete="off">

      <!-- Deck title -->
      <label for="folder_title">Deck folder title</label>
      <input type="text" id="folder_title" name="folder_title"
             placeholder="e.g. Neuroradiology" required>

      <!-- URL panels -->
      <div class="url-panels">
        <div>
          <div class="url-panel-header">
            <label for="article_urls" style="margin:0">Article URLs</label>
            <span class="badge badge-article">Articles</span>
          </div>
          <textarea id="article_urls" name="article_urls"
            placeholder="https://radiopaedia.org/articles/lamina-papyracea-dehiscence&#10;https://radiopaedia.org/articles/..."></textarea>
          <div class="max-cases-row">
            <label for="max_cases_per_article">Max cases per article</label>
            <input type="number" id="max_cases_per_article" name="max_cases_per_article"
                   value="4" min="0" step="1">
            <span class="hint">(0 = unlimited)</span>
          </div>
        </div>
        <div>
          <div class="url-panel-header">
            <label for="case_urls" style="margin:0">Case URLs</label>
            <span class="badge badge-case">Cases</span>
          </div>
          <textarea id="case_urls" name="case_urls"
            placeholder="https://radiopaedia.org/cases/creutzfeldt-jakob-disease&#10;https://radiopaedia.org/cases/..."></textarea>
        </div>
      </div>

      <button class="btn-submit" type="submit" id="submit-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Create Anki Deck
      </button>
    </form>

    <!-- Progress -->
    <div id="progress-section">
      <hr class="sep">
      <div style="margin-top:20px">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div id="progress-log"></div>
      </div>
    </div>

    <!-- Download -->
    <div id="download-section">
      <a id="download-link" class="btn-download" href="#" download>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span id="download-label">Download deck.apkg</span>
      </a>
    </div>
  </div>

  <footer>
    Powered by <strong>United Radiology</strong> 🇨🇭 &nbsp;·&nbsp;
    <a href="https://radiopaedia.org" target="_blank" rel="noopener">Radiopaedia.org</a>
  </footer>

  <script>
  (() => {
    const form         = document.getElementById('job-form');
    const submitBtn    = document.getElementById('submit-btn');
    const progressSec  = document.getElementById('progress-section');
    const progressBar  = document.getElementById('progress-bar');
    const progressLog  = document.getElementById('progress-log');
    const downloadSec  = document.getElementById('download-section');
    const downloadLink = document.getElementById('download-link');
    const downloadLabel= document.getElementById('download-label');

    let es = null;   // EventSource

    function addLog(text, cls) {
      const el = document.createElement('div');
      el.className = 'log-line' + (cls ? ' ' + cls : '');
      el.textContent = text;
      progressLog.appendChild(el);
      progressLog.scrollTop = progressLog.scrollHeight;
      return el;
    }

    let activeLogLine = null;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (es) { es.close(); es = null; }

      // Reset UI
      progressLog.innerHTML = '';
      downloadSec.style.display  = 'none';
      progressSec.style.display  = 'block';
      progressBar.style.width    = '0%';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Working…';
      activeLogLine = addLog('Starting…', 'active');

      const body = new FormData(form);

      let res, data;
      try {
        res  = await fetch('/start', { method: 'POST', body });
        data = await res.json();
      } catch (err) {
        addLog('Network error: ' + err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '&#9654; Create Anki Deck';
        return;
      }

      if (data.error) {
        if (activeLogLine) activeLogLine.remove();
        addLog('Error: ' + data.error, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Create Anki Deck';
        return;
      }

      // Open SSE
      es = new EventSource('/progress/' + data.job_id);

      es.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'heartbeat') return;

        if (msg.type === 'progress') {
          if (activeLogLine) {
            activeLogLine.textContent = msg.message;
          } else {
            activeLogLine = addLog(msg.message, 'active');
          }
          if (msg.pct !== undefined) progressBar.style.width = msg.pct + '%';
          return;
        }

        if (msg.type === 'item_done') {
          if (activeLogLine) { activeLogLine.className = 'log-line done'; }
          activeLogLine = null;
          addLog('✓ ' + msg.message, 'done');
          return;
        }

        if (msg.type === 'done') {
          progressBar.style.width = '100%';
          if (activeLogLine) { activeLogLine.className = 'log-line done'; activeLogLine = null; }
          addLog('✓ Package built successfully!', 'done');

          downloadLink.href = msg.download_url;
          downloadLabel.textContent = 'Download ' + (msg.filename || 'deck.apkg');
          downloadSec.style.display = 'block';
          downloadLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

          submitBtn.disabled = false;
          submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Create Another Deck';
          es.close();
          return;
        }

        if (msg.type === 'error') {
          if (activeLogLine) { activeLogLine.className = 'log-line error'; activeLogLine = null; }
          addLog('✗ ' + msg.message, 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Try Again';
          es.close();
        }
      };

      es.onerror = () => {
        if (activeLogLine) { activeLogLine.className = 'log-line error'; }
        addLog('Connection lost.', 'error');
        es.close();
      };
    });
  })();
  </script>

</body>
</html>
